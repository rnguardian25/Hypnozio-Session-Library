<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hypnozio Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="overlay" onclick="closeMobile()"></div>
  <aside id="sidebar">
    <div id="sb-tab" onclick="toggleSidebar()" title="Toggle sidebar">
      <i class="fa-solid fa-chevron-left" id="tab-icon"></i>
    </div>
    <div class="sb-inner">
      <div class="sb-header">
        <div class="logo-mark">
          <img src="https://lh3.googleusercontent.com/d/1bSi9ozR19haN0Q4CFzImYzXjShiNUOez" alt="Hypnozio logo" width="24" height="24" style="object-fit:contain;display:block;" />
        </div>
        <div class="logo-words">
          <span class="logo-name">Hypnozio</span>
          <span class="logo-tag">Programs Library</span>
        </div>
      </div>
      <nav class="sb-nav" aria-label="Session navigation">
        <div class="sb-label">Sessions</div>

        <!-- Active session — Weight Loss -->
        <div class="sb-item active" data-idx="0" data-tip="Weight Loss" onclick="selectSess(0, this)">
          <div class="sb-icon"><i class="fa-solid fa-fire-flame-curved"></i></div>
          <span class="sb-text">Weight Loss Session</span>
          <span class="sb-badge">45</span>
        </div>

        <!-- Coming soon — not yet linked to selectSess() -->
        <div class="sb-item" data-tip="Coming Soon" onclick="toast('Coming soon — stay tuned!', 'info')">
          <div class="sb-icon"><i class="fa-solid fa-cloud-moon"></i></div>
          <span class="sb-text">Deep Relaxation Session</span>
          <span class="sb-badge">Soon</span>
        </div>

        <div class="sb-item" data-tip="Coming Soon" onclick="toast('Coming soon — stay tuned!', 'info')">
          <div class="sb-icon"><i class="fa-solid fa-seedling"></i></div>
          <span class="sb-text">Focus &amp; Energy Session</span>
          <span class="sb-badge">Soon</span>
        </div>

      </nav>

      <!--
        Footer: copyright line replaces Settings.
        Year is injected dynamically by the inline script below so it
        never needs manual updating.
      -->
      <div class="sb-footer">
        <div class="sb-copyright">
          <i class="fa-regular fa-copyright"></i>
          <span id="copyright-year"></span> Hypnozio. All rights reserved.
        </div>
      </div>
    </div>
  </aside>
  <div id="main">
    <header class="topbar">
      <button class="mobile-btn" onclick="openMobile()" aria-label="Open navigation menu">
        <i class="fa-solid fa-bars-staggered"></i>
      </button>
      <div class="tb-sess-icon" id="tb-icon" aria-hidden="true">
        <i class="fa-solid fa-fire-flame-curved"></i>
      </div>
      <div class="tb-title" id="tb-title">Weight Loss Session</div>
      <div class="search-wrap" id="search-wrap">
        <button class="search-btn" id="search-btn" onclick="toggleSearch(event)" aria-label="Search programs">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <input class="search-input" id="search-input" type="text" placeholder="Search programs…"
               oninput="onSearchInput(event)" onkeydown="onSearchKeydown(event)"
               autocomplete="off" aria-label="Search programs in current language" />
      </div>
      <div class="lang-wrap" id="lang-wrap">
        <button class="lang-globe-btn" id="lang-globe-btn" onclick="toggleLangPopover(event)"
                aria-label="Change language" aria-haspopup="listbox">
          <i class="fa-solid fa-globe globe"></i>
          <span class="lang-code" id="lang-current-code">EN</span>
          <i class="fa-solid fa-chevron-down lang-caret" id="lang-caret"></i>
        </button>
        <div class="lang-popover" id="lang-popover" role="listbox">
          <span class="lang-popover-label">Select Language</span>
          <div id="lang-opts-container"></div>
        </div>
      </div>
    </header>
    <main class="content">
      <div class="act-row" role="toolbar" aria-label="Selection and download actions">
        <div class="act-left">
          <div class="sel-pill" id="sel-pill" aria-live="polite">
            <i class="fa-solid fa-circle-check"></i>
            <span id="sel-cnt">0</span> selected
          </div>
          <button class="btn btn-outline" id="sel-all-btn" onclick="toggleAll()">
            <i class="fa-regular fa-square-check"></i> Select All
          </button>
          <button class="btn btn-outline" id="clr-btn" style="display:none" onclick="clearSel()">
            <i class="fa-solid fa-xmark"></i> Clear
          </button>
        </div>
        <div class="act-right">
          <button class="btn btn-sage" id="dl-sel-btn" onclick="downloadSel()" disabled>
            <i class="fa-solid fa-download"></i> Download Selected
          </button>
          <button class="btn btn-dark" id="dl-all-btn" onclick="downloadAll()">
            <i class="fa-solid fa-folder-arrow-down"></i> Download All
          </button>
        </div>
      </div>
      <div class="cards-grid" id="grid">
        <div id="loading-state" style="grid-column:1/-1;padding:48px 20px;text-align:center;color:var(--muted)">
          <i class="fa-solid fa-circle-notch fa-spin" style="font-size:24px;margin-bottom:14px;display:block;opacity:.5"></i>
          <span style="font-size:13px">Loading programs…</span>
        </div>
      </div>
    </main>
  </div>
  <div id="toasts" aria-live="assertive" aria-atomic="true"></div>
  <!-- Inject current year into copyright line dynamically -->
  <script>
    document.getElementById('copyright-year').textContent = new Date().getFullYear();
  </script>

  <script src="script.js"></script>
</body>
</html>
