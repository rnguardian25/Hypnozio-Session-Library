<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Serene Audio — Wellness Sessions</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
<link href="style.css" rel="stylesheet" />
</head>
<body>

<div id="overlay" onclick="closeMobile()"></div>

<!-- ── SIDEBAR ── -->
<aside id="sidebar">
  <!-- always-visible tab on right edge -->
  <div id="sb-tab" onclick="toggleSidebar()" title="Toggle sidebar">
    <i class="fa-solid fa-chevron-left" id="tab-icon"></i>
  </div>

  <div class="sb-inner">
    <div class="sb-header">
      <div class="logo-mark">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 2 C6 7, 6 15, 11 20 C16 15, 16 7, 11 2Z" fill="none" stroke="#82b494" stroke-width="1.4"/>
          <circle cx="11" cy="11" r="3" fill="#5f9070"/>
          <line x1="11" y1="8" x2="11" y2="14" stroke="#82b494" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M11 11 C13 9.5, 15 10.5, 15.5 11" stroke="#82b494" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M11 11 C9 9.5, 7 10.5, 6.5 11" stroke="#82b494" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-words">
        <span class="logo-name">Serene Audio</span>
        <span class="logo-tag">Wellness Sessions</span>
      </div>
    </div>

    <nav class="sb-nav">
      <div class="sb-label">Sessions</div>
      <div class="sb-item active" data-idx="0" data-tip="Weight Loss" onclick="selectSess(0,this)">
        <div class="sb-icon"><i class="fa-solid fa-fire-flame-curved"></i></div>
        <span class="sb-text">Weight Loss Session</span>
        <span class="sb-badge">5</span>
      </div>
      <div class="sb-item" data-idx="1" data-tip="Deep Relaxation" onclick="selectSess(1,this)">
        <div class="sb-icon"><i class="fa-solid fa-cloud-moon"></i></div>
        <span class="sb-text">Deep Relaxation Session</span>
        <span class="sb-badge">5</span>
      </div>
      <div class="sb-item" data-idx="2" data-tip="Focus & Energy" onclick="selectSess(2,this)">
        <div class="sb-icon"><i class="fa-solid fa-seedling"></i></div>
        <span class="sb-text">Focus &amp; Energy Session</span>
        <span class="sb-badge">5</span>
      </div>

      <div class="sb-label" style="margin-top:12px">Library</div>
      <div class="sb-item" data-tip="All Programs" onclick="toast('Feature coming soon','info')">
        <div class="sb-icon"><i class="fa-solid fa-grip"></i></div>
        <span class="sb-text">All Programs</span>
      </div>
      <div class="sb-item" data-tip="Saved" onclick="toast('Feature coming soon','info')">
        <div class="sb-icon"><i class="fa-regular fa-bookmark"></i></div>
        <span class="sb-text">Saved</span>
      </div>
    </nav>

    <div class="sb-footer">
      <div class="sb-item" data-tip="Settings" onclick="toast('Settings coming soon','info')">
        <div class="sb-icon"><i class="fa-solid fa-sliders"></i></div>
        <span class="sb-text">Settings</span>
      </div>
    </div>
  </div><!-- /sb-inner -->
</aside>

<!-- ── MAIN ── -->
<div id="main">

  <!-- Slim topbar: only mobile hamburger + selection count -->
  <header class="topbar">
    <button class="mobile-btn" onclick="openMobile()"><i class="fa-solid fa-bars-staggered"></i></button>
    <div class="topbar-spacer"></div>
    <div class="sel-pill" id="sel-pill">
      <i class="fa-solid fa-square-check"></i>
      <span id="sel-cnt">0</span> selected
    </div>
  </header>

  <main class="content">

    <!-- ── HERO (title + lang switcher, no duplication) ── -->
    <div class="hero">
      <div class="hero-icon" id="h-icon"><i class="fa-solid fa-fire-flame-curved"></i></div>
      <div class="hero-info">
        <div class="hero-title" id="h-title">Weight Loss Session</div>
        <div class="hero-sub" id="h-sub">5 audio programs &nbsp;·&nbsp; <strong>English</strong></div>
      </div>

      <!-- Language switcher — globe popover -->
      <div class="lang-wrap" id="lang-wrap">
        <button class="lang-globe-btn" onclick="toggleLangPopover(event)" id="lang-globe-btn">
          <i class="fa-solid fa-globe globe"></i>
          <span class="lang-current-label" id="lang-current-label">English</span>
          <i class="fa-solid fa-chevron-down lang-caret" id="lang-caret"></i>
        </button>
        <div class="lang-popover" id="lang-popover">
          <span class="lang-popover-label">Select Language</span>
          <!-- options rendered by JS from LANGUAGES array -->
          <div id="lang-opts-container"></div>
        </div>
      </div>
    </div>

    <!-- ── ACTION ROW ── -->
    <div class="act-row">
      <div class="act-left">
        <button class="btn btn-outline" id="sel-all-btn" onclick="toggleAll()">
          <i class="fa-regular fa-square-check"></i> Select All
        </button>
        <button class="btn btn-outline" id="clr-btn" style="display:none" onclick="clearSel()">
          <i class="fa-solid fa-xmark"></i> Clear
        </button>
      </div>
      <div class="act-right">
        <button class="btn btn-sage" id="dl-sel-btn" onclick="downloadSel()" disabled>
          <i class="fa-solid fa-download"></i> Download Selected
        </button>
        <button class="btn btn-dark" onclick="downloadAll()">
          <i class="fa-solid fa-folder-arrow-down"></i> Download All
        </button>
      </div>
    </div>

    <!-- ── CARDS ── -->
    <div class="cards-grid" id="grid"></div>

  </main>
</div>

<div id="toasts"></div>

<script src="script.js">

</script>
</body>
</html>
